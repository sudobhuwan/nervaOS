[nervaos]
# API Configuration
api_provider = gemini
# Options: gemini, custom

# Gemini Settings
gemini_model = gemini-flash-latest

# Custom API Settings (if api_provider = custom)
custom_api_url = 
custom_api_model = 

# Behavior
context_awareness = true
auto_mode_switch = true

# Safety
max_file_size_mb = 10
backup_retention_days = 7

# UI
hotkey = <Super>space
theme = system
# Options: system, light, dark

# Monitoring
monitor_interval_seconds = 5
ram_alert_threshold = 90
cpu_alert_threshold = 95

# Privacy
log_api_calls = true
telemetry = false
